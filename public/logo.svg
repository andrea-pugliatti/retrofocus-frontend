<svg
      xmlns="http://www.w3.org/2000/svg"
      viewBox="0 0 160 160"
      width="300px"
      height="300px"
    >
      <g id="camera-logo">
          <circle cx="80" cy="80" r="76" fill="#F2F0E6" stroke="#4C3A28" stroke-width="5" />

          <circle cx="80" cy="80" r="56" fill="#EA6B15" />

          <g transform="translate(80, 80)">
            <polygon points="-12,-20.78 12,-20.78 24,0 12,20.78 -12,20.78 -24,0" fill="#F2F0E6" />

            <g stroke="#F2F0E6" stroke-width="4.5" strokeLinecap="round">
              <line x1="-10" y1="-21" x2="50" y2="-20.78" />
              <line x1="-10" y1="-20.78" x2="50" y2="-20.78" transform="rotate(120)" />
              <line x1="-10" y1="-20.78" x2="50" y2="-20.78" transform="rotate(180)" />
              <line x1="-10" y1="-20.78" x2="50" y2="-20.78" transform="rotate(60)" />
              <line x1="-10" y1="-20.78" x2="50" y2="-20.78" transform="rotate(240)" />
              <line x1="-10" y1="-20.78" x2="50" y2="-20.78" transform="rotate(300)" />
            </g>
          </g>

          <circle cx="80" cy="80" r="56" fill="none" stroke="#4C3A28" stroke-width="5" />
      </g>
    </svg>